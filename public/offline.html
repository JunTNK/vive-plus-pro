<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - Vive Plus Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #F1F5F7 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 198, 215, 0.1);
    }
    
    .logo {
      font-size: 32px;
      font-weight: bold;
      color: #00C6D7;
      margin-bottom: 10px;
    }
    
    .logo span {
      color: #92D700;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #00C6D7, #92D700);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 30px auto;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .icon svg {
      width: 60px;
      height: 60px;
      fill: white;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 15px;
    }
    
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 25px;
    }
    
    .retry-btn {
      background: linear-gradient(135deg, #00C6D7, #00A8B5);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 198, 215, 0.3);
    }
    
    .features {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    
    .features h3 {
      color: #333;
      font-size: 14px;
      margin-bottom: 15px;
    }
    
    .feature-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    
    .feature-item {
      background: #f5f5f5;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      color: #666;
    }
    
    .feature-item.available {
      background: #d4edda;
      color: #155724;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Vive Plus <span>Pro</span></div>
    
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.48L18.18 13.8 23.64 7zm-6.6 8.22L3.27 1.44 2 2.72l2.05 2.06C1.91 5.76.59 6.82.36 7L12 21.5l3.04-4.04 2.05 2.05 1.27-1.27-2.32-2.02z"/>
      </svg>
    </div>
    
    <h1>Sin Conexión</h1>
    <p>
      Parece que no tienes conexión a internet. 
      Verifica tu conexión e intenta de nuevo.
    </p>
    
    <button class="retry-btn" onclick="location.reload()">
      Reintentar
    </button>
    
    <div class="features">
      <h3>Funciones disponibles sin conexión:</h3>
      <div class="feature-list">
        <span class="feature-item available">✓ Datos guardados</span>
        <span class="feature-item available">✓ Evaluaciones en cache</span>
        <span class="feature-item available">✓ Participantes</span>
        <span class="feature-item">Sincronización pendiente</span>
      </div>
    </div>
  </div>
  
  <script>
    // Escuchar cuando vuelva la conexión
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
